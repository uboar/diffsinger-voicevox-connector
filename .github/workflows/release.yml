name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_label: windows
            artifact_suffix: .exe
            upload_executable_name: DiffSingerConnector-windows.exe
          - os: macos-latest
            target_label: macos-arm64
            artifact_suffix: ""
            upload_executable_name: DiffSingerConnector-macos-arm64
          - os: macos-15-intel
            target_label: macos-x64
            artifact_suffix: ""
            upload_executable_name: DiffSingerConnector-macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]
          pip install Pillow

      - name: Build standalone executable
        run: python scripts/build_exe.py

      - name: Build VVPP package
        run: python scripts/build_vvpp.py --os ${{ matrix.target_label }}

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release
          cp "dist/DiffSingerConnector${{ matrix.artifact_suffix }}" "release/${{ matrix.upload_executable_name }}"
          cp dist/DiffSingerConnector-*-${{ matrix.target_label }}.vvpp release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DiffSingerConnector-${{ matrix.target_label }}-release
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "DiffSingerConnector*" -o -name "*.vvpp" \) -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
